<!DOCTYPE html>
<html>
<head>
  <meta name="description" content="Admin Dashboard - DGA Heirs" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: #f4f4f7;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 20px 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .header h1 {
      font-size: 1.5rem;
    }

    .logout-btn {
      padding: 10px 20px;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
    }

    .logout-btn:hover {
      background: #b91c1c;
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 2px solid #e5e7eb;
    }

    .tab-btn {
      padding: 12px 20px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      color: #6b7280;
      transition: all 0.3s;
    }

    .tab-btn.active {
      color: #000;
      border-bottom-color: #000;
    }

    .tab-content {
      display: none;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #111;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .btn-primary {
      padding: 12px 24px;
      background: #000;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s;
    }

    .btn-primary:hover {
      background: #111;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }

    .message.success {
      background: #dcfce7;
      color: #16a34a;
    }

    .message.error {
      background: #fee2e2;
      color: #dc2626;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <!-- Login Form (shown if not authenticated) -->
  <div id="loginForm" style="display: none; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f4f4f7;">
    <div style="width: min(420px, calc(100% - 32px)); background: white; padding: 36px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center;">
      <h2 style="margin-bottom: 24px; font-size: 2rem;">Admin Login</h2>
      <input id="email" type="email" placeholder="Email" style="width: 100%; padding: 14px 16px; margin-bottom: 16px; border: 1px solid #d1d5db; border-radius: 12px; font-size: 1rem;" />
      <input id="password" type="password" placeholder="Password" style="width: 100%; padding: 14px 16px; margin-bottom: 16px; border: 1px solid #d1d5db; border-radius: 12px; font-size: 1rem;" />
      <button onclick="login()" style="width: 100%; padding: 14px 16px; border: none; border-radius: 12px; background: #000; color: white; font-size: 1rem; cursor: pointer;">Login</button>
      <div id="loginMessage" style="margin-top: 16px; color: #dc2626; font-size: 0.95rem;"></div>
      <div style="margin-top: 18px; font-size: 0.95rem; color: #6b7280;">
        New here? <a href="register.html" style="color: #000; text-decoration: none; font-weight: 700;">Create an account</a>.
      </div>
    </div>
  </div>

  <!-- Dashboard (shown if authenticated) -->
  <div id="dashboard" style="display: none;">
    <div class="container">
      <div class="header">
        <h1>Admin Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'posts')">Create Post</button>
        <button class="tab-btn" onclick="switchTab(event, 'ebooks')">Upload Ebook</button>
      </div>

      <!-- Posts Section -->
      <div id="posts" class="tab-content active">
        <h2 style="margin-bottom: 20px;">Create a New Post</h2>
        <div id="postMessage" class="message" style="display: none;"></div>
        
        <form onsubmit="createPost(event)">
          <div class="form-group">
            <label for="postTitle">Title *</label>
            <input id="postTitle" type="text" placeholder="Post title" required />
          </div>

          <div class="form-group">
            <label for="postContent">Content *</label>
            <textarea id="postContent" placeholder="Write your post content here..." required></textarea>
          </div>

          <div class="form-group">
            <label for="postTags">Tags (comma-separated)</label>
            <input id="postTags" type="text" placeholder="e.g., music, entertainment, news" />
          </div>

          <button type="submit" class="btn-primary">Publish Post</button>
        </form>
      </div>

      <!-- Ebooks Section -->
      <div id="ebooks" class="tab-content">
        <h2 style="margin-bottom: 20px;">Upload a New Ebook</h2>
        <div id="ebookMessage" class="message" style="display: none;"></div>

        <form onsubmit="uploadEbook(event)" enctype="multipart/form-data">
          <div class="form-group">
            <label for="ebookTitle">Title *</label>
            <input id="ebookTitle" type="text" placeholder="Ebook title" required />
          </div>

          <div class="form-group">
            <label for="ebookDescription">Description *</label>
            <textarea id="ebookDescription" placeholder="Describe your ebook..." required></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="ebookPrice">Price ($)</label>
              <input id="ebookPrice" type="number" step="0.01" placeholder="0.00" value="0" />
            </div>

            <div class="form-group">
              <label for="ebookIsFree">Type *</label>
              <select id="ebookIsFree" required>
                <option value="">Select type...</option>
                <option value="true">Free</option>
                <option value="false">Paid</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="ebookFile">File (PDF, EPUB, etc.) *</label>
            <input id="ebookFile" type="file" required accept=".pdf,.epub,.mobi,.txt" />
          </div>

          <div class="form-group">
            <label for="ebookCover">Cover Image URL</label>
            <input id="ebookCover" type="url" placeholder="https://example.com/cover.jpg" />
          </div>

          <button type="submit" class="btn-primary">Upload Ebook</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    function checkAuth() {
      const token = localStorage.getItem("token");
      const loginForm = document.getElementById("loginForm");
      const dashboard = document.getElementById("dashboard");

      if (token) {
        loginForm.style.display = "none";
        dashboard.style.display = "block";
      } else {
        loginForm.style.display = "flex";
        dashboard.style.display = "none";
      }
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const message = document.getElementById("loginMessage");

      if (!email || !password) {
        message.textContent = "Please enter both email and password.";
        message.style.color = "#dc2626";
        return;
      }

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) {
          const text = await res.text();
          message.textContent = text || "Login failed.";
          message.style.color = "#dc2626";
          return;
        }

        const data = await res.json();
        localStorage.setItem("token", data.token);
        checkAuth();
      } catch (error) {
        message.textContent = "Unable to connect. Please try again.";
        message.style.color = "#dc2626";
      }
    }

    function logout() {
      localStorage.removeItem("token");
      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
      checkAuth();
    }

    function switchTab(event, tabName) {
      event.preventDefault();
      
      // Hide all tabs
      document.querySelectorAll(".tab-content").forEach(tab => {
        tab.classList.remove("active");
      });
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.remove("active");
      });

      // Show selected tab
      document.getElementById(tabName).classList.add("active");
      event.target.classList.add("active");
    }

    function showMessage(elementId, message, type) {
      const messageEl = document.getElementById(elementId);
      messageEl.textContent = message;
      messageEl.className = `message ${type}`;
      messageEl.style.display = "block";
      setTimeout(() => {
        messageEl.style.display = "none";
      }, 5000);
    }

    async function createPost(event) {
      event.preventDefault();
      
      const title = document.getElementById("postTitle").value;
      const content = document.getElementById("postContent").value;
      const tagsStr = document.getElementById("postTags").value;
      const tags = tagsStr ? tagsStr.split(",").map(t => t.trim()).filter(t => t) : [];

      try {
        const res = await fetch("/api/posts/create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, content, tags })
        });

        if (!res.ok) {
          throw new Error("Failed to create post");
        }

        showMessage("postMessage", "✓ Post published successfully!", "success");
        event.target.reset();
      } catch (error) {
        showMessage("postMessage", "✗ Failed to create post. Please try again.", "error");
      }
    }

    async function uploadEbook(event) {
      event.preventDefault();

      const formData = new FormData();
      formData.append("title", document.getElementById("ebookTitle").value);
      formData.append("description", document.getElementById("ebookDescription").value);
      formData.append("price", document.getElementById("ebookPrice").value);
      formData.append("isFree", document.getElementById("ebookIsFree").value);
      formData.append("coverUrl", document.getElementById("ebookCover").value);
      formData.append("file", document.getElementById("ebookFile").files[0]);

      try {
        const res = await fetch("/api/ebooks/upload", {
          method: "POST",
          body: formData
        });

        if (!res.ok) {
          throw new Error("Failed to upload ebook");
        }

        showMessage("ebookMessage", "✓ Ebook uploaded successfully!", "success");
        event.target.reset();
      } catch (error) {
        showMessage("ebookMessage", "✗ Failed to upload ebook. Please try again.", "error");
      }
    }

    // Check auth on page load
    window.addEventListener("load", checkAuth);
  </script>
</body>
</html>
