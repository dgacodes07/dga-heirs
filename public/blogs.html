<body>
  <nav class="nav">
    <div class="nav-container">
      <div class="nav-brand"><a href="index.html">DGA Heirs</a></div>
      <ul class="nav-menu">
        <li><a href="companies.html">Companies</a></li>

        <li><a href="blogs.html">Blogs</a></li>
        <li><a href="mansa-jabulani.html">Mansa Jabulani</a></li>
      </ul>
    </div>
  </nav>

  <section class="blogs-page">
    <div class="page-header">
      <h1>Industry Insights</h1>
      <p>Thought leadership on the creator economy and media.</p>
    </div>
    <div id="blog-grid" class="blog-grid"></div>
  </section>

  <footer class="footer">
    <h3>DGA Heirs</h3>
    <p>Building digital ecosystems across music, media &amp; technology.</p>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="companies.html">Companies</a>
      <a href="mailto:contact@dgaheirs.com">Contact</a>
    </div>
    <p class="copyright">&copy; 2026 DGA Heirs. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
  <script>
    fetch("/api/posts")
      .then(res => {
        if (!res.ok) throw new Error("Failed to load posts");
        return res.json();
      })
      .then(posts => {
        const grid = document.getElementById("blog-grid");
        if (!posts.length) {
          grid.innerHTML = '<p class="empty-state">No posts yet. Create one in the admin dashboard.</p>';
          return;
        }

        posts.forEach(post => {
          const postDiv = document.createElement("div");
          postDiv.classList.add("blog-post");
          const category = post.tags && post.tags.length > 0 ? post.tags[0] : "Blog";
          const content = post.content || "";
          const truncatedContent = content.length > 150 ? content.substring(0, 150) + "..." : content;
          postDiv.innerHTML = `
            <span class="category">${category}</span>
            <h3>${post.title || "Untitled post"}</h3>
            <p>${truncatedContent}</p>
            <a href="#" class="read-more">Read more</a>
          `;
          grid.appendChild(postDiv);
        });
      })
      .catch(error => {
        console.error("Failed to load posts:", error);
        document.getElementById("blog-grid").innerHTML = '<p class="empty-state">Posts are unavailable right now.</p>';
      });
  </script>
</body>
</html>
